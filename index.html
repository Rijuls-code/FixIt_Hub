<html lang="en">
  <head>

    <title>FixIt Hub – Civic Reporting Platform</title>
    <link rel="stylesheet" href="./style.css" />

    <script>
      const runningOnVite = window.location.port === "3000";

    </main>
    <script type="module" src="/src/main.jsx"></script>
